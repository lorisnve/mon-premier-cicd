name: Reusable — Tests

on:
  workflow_call:
    inputs:
      node-versions:
        type: string
        default: '[18, 20]'
      coverage-threshold:
        type: number
        default: 80
    outputs:
      lines:
        description: 'Coverage lines % (dernière instance matrix terminée)'
        value: ${{ jobs.test.outputs.lines }}

jobs:
  test:
    name: 🧪 Tests — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    outputs:
      lines: ${{ steps.coverage.outputs.lines }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    steps:
      - name: Checkout, setup Node.js & npm ci
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: ${{ matrix.node-version }}
      - name: Tests unitaires + couverture
        run: npm run test:ci
      - name: Calculer le coverage total
        id: coverage
        run: |
          PCT=$(node -e "
          const d=JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8'));
          console.log(d.total.lines.pct);
          ")
          echo "lines=$PCT" >> $GITHUB_OUTPUT
          echo "Coverage lines: $PCT%"
      - name: Vérifier le seuil de couverture
        run: |
          PCT="${{ steps.coverage.outputs.lines }}"
          THRESHOLD="${{ inputs.coverage-threshold }}"
          echo "Coverage: $PCT% (seuil: $THRESHOLD%)"
          if (( $(echo "$PCT < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $PCT% < seuil $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage $PCT% ≥ seuil $THRESHOLD%"
      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14
