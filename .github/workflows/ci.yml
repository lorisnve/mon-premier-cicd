name: CI — Lint, Tests & Coverage

on:
  push:
    branches: [main, 'feature/**']
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1 : Lint ──────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js & npm ci
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: '18'
      - name: Vérification Prettier
        run: npm run format:check
      - name: Vérification ESLint
        run: npm run lint
      - name: Audit de sécurité npm
        run: npm audit --audit-level=high

  # ── JOB 2 : Tests (workflow réutilisable) ─────────────
  test:
    uses: ./.github/workflows/test-reusable.yml
    with:
      node-versions: '[18, 20]'
      coverage-threshold: 80

  # ── JOB 3 : Rapport consolidé ─────────────────────────
  report:
    name: 📊 Rapport Coverage
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Télécharger tous les rapports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-node-*
          merge-multiple: false
          path: all-coverage/
      - name: Afficher le résumé dans Step Summary
        run: |
          echo '## 📊 Rapport de Couverture' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Version | Statements | Branches | Functions | Lines |' >> $GITHUB_STEP_SUMMARY
          echo '|---------|-----------|---------|----------|-------|' >> $GITHUB_STEP_SUMMARY
          for dir in all-coverage/coverage-node-*/; do
            version=$(basename $dir | sed 's/coverage-node-//')
            summary="$dir/coverage-summary.json"
            if [ -f "$summary" ]; then
              node -e "
                const d=JSON.parse(require('fs').readFileSync('$summary','utf8')).total;
                console.log('| Node '+$version+' | '+d.statements.pct+'% | '+d.branches.pct+'% | '+d.functions.pct+'% | '+d.lines.pct+'% |');
              " >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Afficher le coverage
        run: |
          # needs.test.outputs.lines = dernière valeur matrix (Node 20 en général)
          echo "📈 Coverage lines (dernière instance matrix) : ${{ needs.test.outputs.lines }}%"
      - name: Résultat global CI
        run: |
          lint_ok='${{ needs.lint.result }}'
          test_ok='${{ needs.test.result }}'
          echo "Lint: $lint_ok | Tests: $test_ok"
          if [ "$lint_ok" != 'success' ] || [ "$test_ok" != 'success' ]; then
            echo '❌ CI échoué' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo '✅ CI complet — tous les jobs sont verts' >> $GITHUB_STEP_SUMMARY
      - name: Step Summary (Tests)
        if: success()
        run: echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY

  # ── JOB 4 : Docker Build (Challenge) ──────────────────
  build-docker:
    name: 🐳 Build Docker Image
    needs: [report]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (avec cache GHA)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mon-premier-cicd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Step Summary (Docker)
        run: echo "✅ Docker image build step executed" >> $GITHUB_STEP_SUMMARY

  # ── JOB 5 : Security Scan (Trivy) ───────────────────────
  security:
    name: 🔒 Security Scan (Trivy)
    needs: [build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image pour le scan
        run: docker build -t mon-premier-cicd:${{ github.sha }} .
      - name: Scan Trivy de l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mon-premier-cicd:${{ github.sha }}'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'

  # ── JOB 6 : Deploy Staging (Challenge) ────────────────
  deploy-staging:
    needs: [security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Déclencher le déploiement Render (Staging)
        run: curl -X POST "${{ secrets.RENDER_STAGING_HOOK }}"
        
      - name: Attendre le déploiement
        run: sleep 45
        
      - name: Health Check Staging
        # URL fictive pour le staging, à adapter avec la vraie URL Render de staging
        run: curl --fail https://mon-premier-cicd-cvyk.onrender.com/health

      - name: Step Summary (Staging)
        run: echo "🚀 Staging deployed at https://mon-premier-cicd-cvyk.onrender.com" >> $GITHUB_STEP_SUMMARY

  # ── JOB 7 : Deploy Production (Challenge) ─────────────
  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Déclencher le déploiement Render (Production)
        run: curl -X POST "${{ secrets.RENDER_PROD_HOOK }}"
        
      - name: Attendre le déploiement
        run: sleep 45
        
      - name: Health Check Production
        run: curl --fail https://mon-premier-cicd-m7k0.onrender.com/health

      - name: Step Summary (Production)
        run: echo "🌍 Production deployed at https://mon-premier-cicd-m7k0.onrender.com" >> $GITHUB_STEP_SUMMARY

  # ── JOB 8 : Notification échec (Slack) ───────────────
  notify-failure:
    name: 🚨 Notify Failure (Slack)
    needs: [lint, test, report, build-docker, security, deploy-staging, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer une alerte Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \"❌ *Pipeline échoué sur \`$BRANCH\`*\",
              \"attachments\": [{
                \"color\": \"#FF0000\",
                \"fields\": [
                  {\"title\": \"Repo\",   \"value\": \"$REPO\",    \"short\": true},
                  {\"title\": \"Branche\", \"value\": \"$BRANCH\",  \"short\": true},
                  {\"title\": \"Commit SHA\", \"value\": \"$SHA\"},
                  {\"title\": \"Logs\",   \"value\": \"$RUN_URL\"}
                ]
              }]
            }"

  # ── JOB 9 : Notification succès (Slack) ───────────────
  notify-success:
    name: ✅ Notify Success (Slack)
    needs: [deploy-production]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer une confirmation Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \"✅ *Déploiement réussi en production*\",
              \"attachments\": [{
                \"color\": \"#36A64F\",
                \"fields\": [
                  {\"title\": \"Repo\",   \"value\": \"$REPO\",    \"short\": true},
                  {\"title\": \"Branche\", \"value\": \"$BRANCH\",  \"short\": true},
                  {\"title\": \"Commit SHA\", \"value\": \"$SHA\"},
                  {\"title\": \"URL Production\", \"value\": \"https://mon-premier-cicd-m7k0.onrender.com\"},
                  {\"title\": \"Logs\",   \"value\": \"$RUN_URL\"}
                ]
              }]
            }"