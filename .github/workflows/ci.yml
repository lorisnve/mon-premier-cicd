name: CI — Lint, Tests & Coverage

on:
  push:
    branches: [main, 'feature/**']
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'

  workflow_dispatch:

# Annule les runs obsolètes sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1 : Lint ──────────────────────────────────────
  lint:
    name: 🔍 Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Vérification ESLint
        run: npm run lint

  # ── JOB 2 : Tests avec matrix ─────────────────────────
  test:
    name: 🧪 Tests — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Tests unitaires + couverture
        run: npm run test:ci
      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

  # ── JOB 3 : Rapport consolidé ─────────────────────────
  report:
    name: 📊 Rapport Coverage
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Télécharger tous les rapports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-node-*
          merge-multiple: false
          path: all-coverage/
      - name: Afficher le résumé dans Step Summary
        run: |
          echo '## 📊 Rapport de Couverture' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Version | Statements | Branches | Functions | Lines |' >> $GITHUB_STEP_SUMMARY
          echo '|---------|-----------|---------|----------|-------|' >> $GITHUB_STEP_SUMMARY
          for dir in all-coverage/coverage-node-*/; do
            version=$(basename $dir | sed 's/coverage-node-//')
            summary="$dir/coverage-summary.json"
            if [ -f "$summary" ]; then
              node -e "
                const d=JSON.parse(require('fs').readFileSync('$summary','utf8')).total;
                console.log('| Node '+$version+' | '+d.statements.pct+'% | '+d.branches.pct+'% | '+d.functions.pct+'% | '+d.lines.pct+'% |');
              " >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Résultat global CI
        run: |
          lint_ok='${{ needs.lint.result }}'
          test_ok='${{ needs.test.result }}'
          echo "Lint: $lint_ok | Tests: $test_ok"
          if [ "$lint_ok" != 'success' ] || [ "$test_ok" != 'success' ]; then
            echo '❌ CI échoué' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo '✅ CI complet — tous les jobs sont verts' >> $GITHUB_STEP_SUMMARY